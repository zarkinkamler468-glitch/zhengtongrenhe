services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: edu_policy
      POSTGRES_PASSWORD: edu_policy_secret
      POSTGRES_DB: edu_policy_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edu_policy -d edu_policy_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://edu_policy:edu_policy_secret@postgres:5432/edu_policy_db
      REDIS_URL: redis://redis:6379/0
      ELASTICSEARCH_URL: http://elasticsearch:9200
      LLM_PROVIDER: deepseek
      LLM_BASE_URL: https://api.deepseek.com/v1
      LLM_MODEL: deepseek-chat
    volumes:
      - ./backend:/app
      - attachment_data:/app/data/attachments
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://edu_policy:edu_policy_secret@postgres:5432/edu_policy_db
      REDIS_URL: redis://redis:6379/0
      ELASTICSEARCH_URL: http://elasticsearch:9200
      LLM_PROVIDER: deepseek
      LLM_BASE_URL: https://api.deepseek.com/v1
      LLM_MODEL: deepseek-chat
    volumes:
      - ./backend:/app
      - attachment_data:/app/data/attachments
    depends_on:
      - api
      - redis
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://edu_policy:edu_policy_secret@postgres:5432/edu_policy_db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - celery_worker

volumes:
  postgres_data:
  redis_data:
  es_data:
  attachment_data:
