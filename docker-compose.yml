name: edu-policy

x-backend-env: &backend-env
  DATABASE_URL: mysql+aiomysql://edu_policy:${MYSQL_PASSWORD}@mysql:3306/edu_policy_db?charset=utf8mb4
  REDIS_URL: redis://redis:6379/0
  CELERY_EAGER: "false"
  SECRET_KEY: ${SECRET_KEY}
  ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
  LLM_PROVIDER: deepseek
  LLM_API_KEY: ${LLM_API_KEY:-}
  LLM_BASE_URL: https://api.deepseek.com/v1
  LLM_MODEL: deepseek-chat
  ATTACHMENT_DIR: ./data/attachments
  DEFAULT_CRAWL_INTERVAL_MINUTES: "30"

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: edu_policy_db
      MYSQL_USER: edu_policy
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=128M
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 96M

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *backend-env
    volumes:
      - backend_data:/app/data
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 384M

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=1
    environment:
      <<: *backend-env
    volumes:
      - backend_data:/app/data
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 384M

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      <<: *backend-env
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 128M

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_URL}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      api:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 384M

volumes:
  mysql_data:
  backend_data:
