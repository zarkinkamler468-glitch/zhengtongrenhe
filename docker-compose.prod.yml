# 2核2G 小机生产用：MySQL + Redis 用宝塔本机，Docker 只跑业务进程
# 用法见 docs/宝塔部署-精简Docker.md

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ./backend/.env
    environment:
      CELERY_EAGER: "false"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/data:/app/data
    mem_limit: 512m

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=1
    env_file:
      - ./backend/.env
    environment:
      CELERY_EAGER: "false"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/data:/app/data
    depends_on:
      - api
    mem_limit: 512m

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      CELERY_EAGER: "false"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - celery_worker
    mem_limit: 256m

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://your-domain.com}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - api
    mem_limit: 384m
