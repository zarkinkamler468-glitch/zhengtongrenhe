# 宝塔 Nginx 反代配置片段（站点 → 设置 → 配置文件，合并到 server { } 内）
# 前端 Next.js: 127.0.0.1:3000  |  后端 API: 127.0.0.1:8000
#
# 重要：勿对整站开启「静态文件缓存」或 CDN 全站缓存，否则会出现
# ChunkLoadError / 页面跳回旧版（HTML 与 _next/static 版本不一致）

# API
location /api/ {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
}

# Next.js 静态资源（带 content hash，可长期缓存）
location /_next/static/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "public, max-age=31536000, immutable";
}

# 页面 HTML / RSC（禁止缓存，避免部署后 404 chunk）
location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    add_header Cache-Control "no-store, must-revalidate";
}
